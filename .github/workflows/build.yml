name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            artifact: rayn-macos-amd64
          - os: windows-latest
            artifact: rayn-windows-amd64
          - os: ubuntu-22.04
            artifact: rayn-linux-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -clean

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/bin/rayn.app dist/${{ matrix.artifact }}.zip

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/bin/* -DestinationPath dist/${{ matrix.artifact }}.zip -Force

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C build/bin .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14
